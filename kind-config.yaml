# ============================================================
#  LabLabee – Shared Cluster
#  Kind Cluster Configuration – Challenge 03 + Challenge 05
#  Un seul cluster pour les deux challenges
# ============================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: shared-lab

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
            eviction-hard: "memory.available<200Mi"
    extraPortMappings:
      # ── Challenge 03 – ODA Canvas ──────────────────────────
      - containerPort: 30303
        hostPort: 3003
        protocol: TCP
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
      - containerPort: 30082
        hostPort: 8082
        protocol: TCP
      # ── Challenge 05 – CAMARA ──────────────────────────────
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      - containerPort: 30083
        hostPort: 8083
        protocol: TCP
      - containerPort: 30084
        hostPort: 8084
        protocol: TCP
      - containerPort: 30085
        hostPort: 8085
        protocol: TCP
