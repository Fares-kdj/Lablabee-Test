# ============================================================
#  LabLabee – Challenge 3: ODA Canvas
#  ODA Component: Product Catalog Management
#  TMF Open API: TMF620 v4
#  ODA Component Spec: https://github.com/tmforum-oda/oda-canvas
# ============================================================

apiVersion: oda.tmforum.org/v1beta3
kind: Component
metadata:
  name: productcatalog
  namespace: canvas
  labels:
    app: productcatalog
    oda.tmforum.org/componentName: productcatalog
    lablabee.io/challenge: "3"
spec:
  type: productcatalog
  selector:
    matchLabels:
      app: productcatalog

  # ── Core Function ─────────────────────────────────────────
  coreFunction:

    exposedAPIs:
      - name: productcatalogmanagement
        specification: >-
          https://tmforum-rand.github.io/TMForum-ODA-Asset-Build/swaggers/TMF620-ProductCatalog-v4.0.0.swagger.json
        implementation: /productcatalog/tmf-api/productCatalogManagement/v4
        path: /productcatalog/tmf-api/productCatalogManagement/v4
        port: 8080
        resources:
          - catalog
          - category
          - productOffering
          - productOfferingPrice
          - productSpecification
          - exportJob
          - importJob

    dependentAPIs:
      - name: partymanagement
        specification: >-
          https://tmforum-rand.github.io/TMForum-ODA-Asset-Build/swaggers/TMF632-Party-v4.0.0.swagger.json
        resources:
          - individual
          - organization

    publishedEvents:
      - name: ProductOfferingCreateEvent
        href: /productcatalog/tmf-api/productCatalogManagement/v4/hub
      - name: ProductOfferingDeleteEvent
        href: /productcatalog/tmf-api/productCatalogManagement/v4/hub
      - name: ProductSpecificationCreateEvent
        href: /productcatalog/tmf-api/productCatalogManagement/v4/hub

    subscribedEvents: []

  # ── Management Function ───────────────────────────────────
  managementFunction:
    exposedAPIs:
      - name: metrics
        specification: prometheus
        implementation: /productcatalog/metrics
        path: /productcatalog/metrics
        port: 8080

  # ── Security Function ─────────────────────────────────────
  securityFunction:
    controllerRole: Admin
    exposedAPIs:
      - name: partyrole
        specification: >-
          https://tmforum-rand.github.io/TMForum-ODA-Asset-Build/swaggers/TMF669-PartyRole-v4.0.0.swagger.json
        implementation: /productcatalog/tmf-api/partyRoleManagement/v4
        path: /productcatalog/tmf-api/partyRoleManagement/v4
        port: 8080
        resources:
          - partyRole

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalog
  namespace: canvas
  labels:
    app: productcatalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productcatalog
  template:
    metadata:
      labels:
        app: productcatalog
    spec:
      containers:
        - name: productcatalog
          # Official TM Forum reference implementation image
          image: tmforumorg/tmf620-product-catalog:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "lab"
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/tmf-api/productCatalogManagement/v4"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /tmf-api/productCatalogManagement/v4/catalog
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /tmf-api/productCatalogManagement/v4/catalog
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: productcatalog-api
  namespace: canvas
  labels:
    app: productcatalog
spec:
  type: NodePort
  selector:
    app: productcatalog
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
