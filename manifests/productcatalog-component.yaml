apiVersion: oda.tmforum.org/v1beta3
kind: Component
metadata:
  name: productcatalog
  namespace: components
  labels:
    oda.tmforum.org/componentName: productcatalog
    oda.tmforum.org/funtionalBlockName: CoreCommerce
    lablabee.io/challenge: "3"
spec:
  id: TMFC001
  name: ProductCatalogManagement
  functionalBlock: CoreCommerce
  description: "Product Catalog Management ODA-Component - LabLabee Challenge 3"
  version: "1.0.0"
  status: specified
  publicationDate: "2024-01-01T00:00:00Z"
  maintainers:
    - name: LabLabee
      email: lab@lablabee.io
  owners:
    - name: LabLabee
      email: lab@lablabee.io

  coreFunction:
    exposedAPIs:
      - name: productcatalogmanagement
        specification:
          - https://raw.githubusercontent.com/tmforum-apis/TMF620_ProductCatalog/master/TMF620-ProductCatalog-v4.0.0.swagger.json
        implementation: productcatalog-api
        apitype: openapi
        path: /tmf-api/productCatalogManagement/v4
        developerUI: /tmf-api/productCatalogManagement/v4/docs
        port: 8080
    dependentAPIs:
      - name: partymanagement
        specification: https://raw.githubusercontent.com/tmforum-apis/TMF632_PartyManagement/master/TMF632-Party-v4.0.0.swagger.json
        apitype: openapi

  managementFunction:
    exposedAPIs:
      - name: metrics
        specification:
          - https://openmetrics.io/
        apitype: prometheus
        implementation: productcatalog-api
        path: /productcatalog/metrics
        port: 8080

  securityFunction:
    controllerRole: Admin
    exposedAPIs:
      - name: partyrole
        specification:
          - https://raw.githubusercontent.com/tmforum-apis/TMF669_PartyRole/master/TMF669-PartyRole-v4.0.0.swagger.json
        implementation: productcatalog-api
        apitype: openapi
        path: /productcatalog/tmf-api/partyRoleManagement/v4
        developerUI: /tmf-api/partyRoleManagement/v4/docs
        port: 8080
