---
# ── Deployment: productcatalog ────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalog-api
  namespace: components
  labels:
    app: productcatalog-api
    oda.tmforum.org/componentName: productcatalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productcatalog-api
  template:
    metadata:
      labels:
        app: productcatalog-api
        oda.tmforum.org/componentName: productcatalog
    spec:
      containers:
        - name: productcatalog-api
          image: node:18-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: server-code
              mountPath: /app
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: server-code
          configMap:
            name: productcatalog-server

---
# ── Service: productcatalog ───────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: productcatalog-api
  namespace: components
  labels:
    app: productcatalog-api
    oda.tmforum.org/componentName: productcatalog
spec:
  type: NodePort
  selector:
    app: productcatalog-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081

