# ── ConfigMap: TMF620 mock server ─────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: productcatalog-server
  namespace: components
data:
  server.js: |
    const http = require('http');
    const url  = require('url');
    const store = {
      catalog: [
        { id:'cat-001', name:'LabLabee Enterprise Catalog', catalogType:'ProductCatalog',
          lifecycleStatus:'Active', '@type':'Catalog', validFor:{ startDateTime:'2024-01-01T00:00:00Z' } }
      ],
      category: [],
      productOffering: [
        { id:'po-001', name:'5G Enterprise Slice Standard', lifecycleStatus:'Active', '@type':'ProductOffering' },
        { id:'po-002', name:'IoT Connectivity Pack 1000 devices', lifecycleStatus:'Active', '@type':'ProductOffering' }
      ],
      productSpecification: []
    };
    const BASE = '/tmf-api/productCatalogManagement/v4';
    let idCounter = 100;
    function send(res, status, body) {
      res.writeHead(status, { 'Content-Type':'application/json', 'Access-Control-Allow-Origin':'*' });
      res.end(JSON.stringify(body, null, 2));
    }
    http.createServer((req, res) => {
      if (req.method === 'OPTIONS') { send(res, 204, {}); return; }
      const path = url.parse(req.url).pathname.replace(/\/$/, '');
      const parts = path.replace(BASE, '').split('/').filter(Boolean);
      const resource = parts[0]; const id = parts[1];
      if (!resource || path === BASE) { send(res, 200, { status:'ok', api:'TMF620 ProductCatalog v4' }); return; }
      if (path === '/health') { send(res, 200, { status:'ok' }); return; }
      if (path === '/metrics') { res.writeHead(200,{'Content-Type':'text/plain'}); res.end('requests_total 42\n'); return; }
      if (!store[resource]) { send(res, 404, { message:'Resource not found: '+resource }); return; }
      let body = '';
      req.on('data', d => { body += d; });
      req.on('end', () => {
        if (req.method === 'GET' && !id) { send(res, 200, store[resource]); }
        else if (req.method === 'GET' && id) {
          const item = store[resource].find(x => x.id === id);
          item ? send(res, 200, item) : send(res, 404, { message:'Not found: '+id });
        } else if (req.method === 'POST') {
          try {
            const obj = Object.assign(JSON.parse(body), { id: resource+'-'+(++idCounter), '@type': resource });
            store[resource].push(obj); send(res, 201, obj);
          } catch(e) { send(res, 400, { message:'Invalid JSON' }); }
        } else if (req.method === 'DELETE' && id) {
          const idx = store[resource].findIndex(x => x.id === id);
          if (idx < 0) { send(res, 404, { message:'Not found' }); return; }
          store[resource].splice(idx, 1); send(res, 204, {});
        } else { send(res, 405, { message:'Method not allowed' }); }
      });
    }).listen(8080, () => console.log('TMF620 mock on :8080'));

