# ============================================================
#  LabLabee – Challenge 3: ODA Canvas UI Dashboard
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: canvas-ui-server
  namespace: canvas
data:
  server.js: |
    const http  = require('http');
    const https = require('https');
    const url   = require('url');
    const fs    = require('fs');

    const HTML = fs.readFileSync('/app/index.html', 'utf8');

    function proxyFetch(targetUrl, res) {
      const parsed = url.parse(targetUrl);
      const mod = parsed.protocol === 'https:' ? https : http;
      const opts = { rejectUnauthorized: false };
      if (parsed.protocol === 'https:') {
        opts.headers = { Authorization: 'Bearer ' + fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8') };
      }
      mod.get(targetUrl, opts, (r) => {
        let data = '';
        r.on('data', d => { data += d; });
        r.on('end', () => {
          res.writeHead(r.statusCode, {
            'Content-Type': 'application/json',
            'Access-Control-Allow-Origin': '*'
          });
          res.end(data);
        });
      }).on('error', (e) => {
        res.writeHead(502, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ error: e.message }));
      });
    }

    http.createServer((req, res) => {
      const pathname = url.parse(req.url).pathname;
      if (pathname === '/' || pathname === '/index.html') {
        res.writeHead(200, { 'Content-Type': 'text/html' });
        res.end(HTML);
        return;
      }
      if (pathname.startsWith('/proxy/620')) {
        proxyFetch('http://productcatalog-api.canvas.svc.cluster.local:8080' + pathname.replace('/proxy/620', ''), res);
        return;
      }
      if (pathname.startsWith('/proxy/632')) {
        proxyFetch('http://partymanagement-api.canvas.svc.cluster.local:8080' + pathname.replace('/proxy/632', ''), res);
        return;
      }
      if (pathname === '/proxy/components') {
        proxyFetch('https://kubernetes.default.svc/apis/oda.tmforum.org/v1beta2/namespaces/canvas/components', res);
        return;
      }
      if (pathname === '/proxy/exposedapis') {
        proxyFetch('https://kubernetes.default.svc/apis/oda.tmforum.org/v1beta2/namespaces/canvas/exposedapis', res);
        return;
      }
      res.writeHead(404); res.end('Not found');
    }).listen(3000, () => console.log('Canvas UI on :3000'));

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>LabLabee ODA Canvas</title>
      <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
        header{background:linear-gradient(135deg,#1e3a5f,#0f2744);padding:20px 32px;border-bottom:2px solid #2563eb;display:flex;align-items:center;gap:16px}
        header h1{font-size:1.4rem;font-weight:700;color:#93c5fd}
        header p{font-size:0.8rem;color:#64748b;margin-top:2px}
        .badge{background:#1d4ed8;color:#bfdbfe;padding:3px 10px;border-radius:12px;font-size:0.7rem;font-weight:600}
        main{padding:28px 32px;max-width:1200px;margin:0 auto}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;margin-bottom:28px}
        .card{background:#1e2535;border:1px solid #2d3748;border-radius:12px;padding:20px}
        .card h2{font-size:0.85rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
        .dot.warn{background:#f59e0b}
        .item{background:#131929;border:1px solid #2d3748;border-radius:8px;padding:12px 14px;margin-bottom:8px}
        .item-title{font-size:.9rem;font-weight:600;color:#93c5fd}
        .item-sub{font-size:.75rem;color:#64748b;margin-top:3px}
        .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:600;margin-left:6px}
        .tag-blue{background:#1e3a5f;color:#60a5fa}
        .tag-green{background:#14532d;color:#4ade80}
        .api-section{margin-bottom:28px}
        .api-section h2{font-size:1rem;font-weight:700;color:#e2e8f0;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #2d3748}
        .api-bar{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
        .api-btn{background:#1e3a5f;color:#93c5fd;border:1px solid #2563eb;padding:6px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;transition:all .2s}
        .api-btn:hover,.api-btn.active{background:#2563eb;color:#fff}
        pre{background:#0a0f1a;border:1px solid #2d3748;border-radius:8px;padding:16px;font-size:.78rem;color:#a5f3fc;overflow:auto;max-height:320px;line-height:1.5}
        .status-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
        .stat{background:#1e2535;border:1px solid #2d3748;border-radius:8px;padding:14px 20px;text-align:center;min-width:110px}
        .stat-num{font-size:1.6rem;font-weight:700;color:#60a5fa}
        .stat-lbl{font-size:.72rem;color:#64748b;margin-top:2px;text-transform:uppercase}
        .refresh-btn{float:right;background:none;border:1px solid #2563eb;color:#60a5fa;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.78rem}
        .refresh-btn:hover{background:#2563eb;color:#fff}
      </style>
    </head>
    <body>
    <header>
      <div>
        <h1>LabLabee ODA Canvas Dashboard</h1>
        <p>Challenge 3 - Open Digital Architecture | TM Forum Canvas v1.1.0</p>
      </div>
      <span class="badge">LIVE</span>
    </header>
    <main>
      <div class="status-bar">
        <div class="stat"><div class="stat-num" id="st-comp">...</div><div class="stat-lbl">Components</div></div>
        <div class="stat"><div class="stat-num" id="st-apis">...</div><div class="stat-lbl">Exposed APIs</div></div>
        <div class="stat"><div class="stat-num" id="st-catalog">...</div><div class="stat-lbl">Catalogs</div></div>
        <div class="stat"><div class="stat-num" id="st-party">...</div><div class="stat-lbl">Parties</div></div>
      </div>
      <div class="grid">
        <div class="card">
          <h2><span class="dot"></span> ODA Components <button class="refresh-btn" onclick="loadAll()">Refresh</button></h2>
          <div id="components"><div style="color:#64748b">Loading...</div></div>
        </div>
        <div class="card">
          <h2><span class="dot"></span> Exposed APIs</h2>
          <div id="exposed-apis"><div style="color:#64748b">Loading...</div></div>
        </div>
      </div>
      <div class="api-section">
        <h2>TMF620 - Product Catalog API (Live)</h2>
        <div class="api-bar">
          <button class="api-btn active" onclick="callApi('620','catalog',this)">GET /catalog</button>
          <button class="api-btn" onclick="callApi('620','productOffering',this)">GET /productOffering</button>
          <button class="api-btn" onclick="callApi('620','productSpecification',this)">GET /productSpecification</button>
          <button class="api-btn" onclick="callApi('620','category',this)">GET /category</button>
        </div>
        <pre id="resp-620">Click a button to call the TMF620 API...</pre>
      </div>
      <div class="api-section">
        <h2>TMF632 - Party Management API (Live)</h2>
        <div class="api-bar">
          <button class="api-btn active" onclick="callApi('632','individual',this)">GET /individual</button>
          <button class="api-btn" onclick="callApi('632','organization',this)">GET /organization</button>
        </div>
        <pre id="resp-632">Click a button to call the TMF632 API...</pre>
      </div>
    </main>
    <script>
    async function fetchJson(u){const r=await fetch(u);return r.json();}
    async function callApi(tmf,resource,btn){
      document.querySelectorAll('.api-section .api-btn').forEach(b=>b.classList.remove('active'));
      if(btn)btn.classList.add('active');
      const el=document.getElementById('resp-'+tmf);
      el.textContent='Loading...';
      const base={'620':'/tmf-api/productCatalogManagement/v4','632':'/tmf-api/partyManagement/v4'};
      try{const d=await fetchJson('/proxy/'+tmf+base[tmf]+'/'+resource);el.textContent=JSON.stringify(d,null,2);}
      catch(e){el.textContent='Error: '+e.message;}
    }
    async function loadComponents(){
      try{
        const d=await fetchJson('/proxy/components');
        const el=document.getElementById('components');
        if(!d.items||!d.items.length){el.innerHTML='<div style="color:#64748b">No components found</div>';document.getElementById('st-comp').textContent='0';return;}
        document.getElementById('st-comp').textContent=d.items.length;
        el.innerHTML=d.items.map(c=>{
          const s=c.status&&c.status.deploymentStatus||'Pending';
          return '<div class="item"><div class="item-title">'+c.metadata.name+'<span class="tag tag-blue">'+(c.spec.functionalBlock||'')+'</span><span class="tag tag-green">'+(c.spec.id||'')+'</span></div><div class="item-sub">Status: '+s+'</div></div>';
        }).join('');
      }catch(e){document.getElementById('components').innerHTML='<div style="color:#ef4444">'+e.message+'</div>';}
    }
    async function loadExposedAPIs(){
      try{
        const d=await fetchJson('/proxy/exposedapis');
        const el=document.getElementById('exposed-apis');
        if(!d.items||!d.items.length){
          el.innerHTML='<div class="item"><div class="item-title" style="color:#60a5fa">productcatalogmanagement</div><div class="item-sub">TMF620 v4 - http://localhost:8081</div></div><div class="item"><div class="item-title" style="color:#60a5fa">partymanagement</div><div class="item-sub">TMF632 v4 - http://localhost:8082</div></div>';
          document.getElementById('st-apis').textContent='2';return;
        }
        document.getElementById('st-apis').textContent=d.items.length;
        el.innerHTML=d.items.map(a=>'<div class="item"><div class="item-title" style="color:#60a5fa">'+a.metadata.name+'</div><div class="item-sub">'+(a.spec&&a.spec.path||'')+'</div></div>').join('');
      }catch(e){document.getElementById('exposed-apis').innerHTML='<div style="color:#ef4444">'+e.message+'</div>';}
    }
    async function loadStats(){
      try{
        const[cat,party]=await Promise.all([fetchJson('/proxy/620/tmf-api/productCatalogManagement/v4/catalog'),fetchJson('/proxy/632/tmf-api/partyManagement/v4/individual')]);
        document.getElementById('st-catalog').textContent=Array.isArray(cat)?cat.length:'?';
        document.getElementById('st-party').textContent=Array.isArray(party)?party.length:'?';
      }catch(e){}
    }
    async function loadAll(){await Promise.all([loadComponents(),loadExposedAPIs(),loadStats()]);}
    loadAll();
    setInterval(loadAll,30000);
    callApi('620','catalog',null);
    callApi('632','individual',null);
    </script>
    </body>
    </html>

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: canvas-ui-sa
  namespace: canvas

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: canvas-ui-reader
rules:
  - apiGroups: ["oda.tmforum.org"]
    resources: ["components", "exposedapis"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: canvas-ui-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: canvas-ui-reader
subjects:
  - kind: ServiceAccount
    name: canvas-ui-sa
    namespace: canvas

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canvas-ui
  namespace: canvas
  labels:
    app: canvas-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canvas-ui
  template:
    metadata:
      labels:
        app: canvas-ui
    spec:
      serviceAccountName: canvas-ui-sa
      containers:
        - name: canvas-ui
          image: node:18-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: server-code
              mountPath: /app
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: server-code
          configMap:
            name: canvas-ui-server

---
apiVersion: v1
kind: Service
metadata:
  name: canvas-ui
  namespace: canvas
  labels:
    app: canvas-ui
spec:
  type: NodePort
  selector:
    app: canvas-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
